<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/static/styles.css">
    <title>yuhigawa — fragments</title>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <header class="masthead">
                <div class="brand">
                    <span class="dot"></span>
                    <span>yuhigawa</span>
                    <span class="domain">blog.yuhigawa.dev</span>
                </div>

                <div class="profile">
                    <div class="sun" aria-hidden="true"></div>
                    <p class="description">
                        Notes from the river at dusk &mdash; <em>fragments</em> on languages, runtimes &amp; the shape of code.
                    </p>
                </div>
            </header>

            <nav class="menu">
                <!-- {{menu}} -->
            </nav>

            <!-- {{banner}} -->

            <footer class="sidebar-foot">
                <span>MMXXVI &mdash; <a href="https://github.com/yuhigawa" target="_blank" rel="noopener">github</a></span>
                <span>made with gleam &amp; erlang</span>
            </footer>
        </aside>

        <main class="content">
            <div class="year-mark">MMXXVI</div>

            <div class="content-header">
                <div class="eyebrow">
                    <span class="num">№ 001</span>
                    <span class="sep"></span>
                    <span>fragments</span>
                </div>
                <div class="year">夕</div>
            </div>

            <article id="dynamic-content"></article>
        </main>
    </div>

    <script>
        const slot = document.getElementById('dynamic-content');
        const items = document.querySelectorAll('.submenu-item');

        items.forEach(item => {
            item.addEventListener('click', function() {
                const group = this.dataset.group;
                const leaf = this.id;
                const tpl = document.getElementById(`template-${group}-${leaf}`);
                if (!tpl) {
                    slot.innerHTML = `<p style="font-family:var(--serif-display); font-style:italic; color:var(--ink-mute);">No entry yet for &ldquo;${this.textContent}&rdquo;.</p>`;
                } else {
                    slot.innerHTML = '';
                    slot.appendChild(document.importNode(tpl.content, true));
                }

                items.forEach(i => i.classList.remove('is-active'));
                this.classList.add('is-active');

                slot.classList.remove('is-entering');
                void slot.offsetWidth;
                slot.classList.add('is-entering');
            });
        });
    </script>
    <!-- {{templates}} -->
</body>
</html>
